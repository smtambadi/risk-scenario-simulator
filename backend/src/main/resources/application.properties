spring.application.name=risk-simulator
spring.datasource.url=jdbc:postgresql://localhost:5432/risk_simulator
spring.datasource.username=postgres
spring.datasource.password=1253236

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Disable open-in-view to prevent connections being held for entire HTTP request lifecycle
spring.jpa.open-in-view=false

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Server port (PDF spec: 8080)
server.port=8081

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false

# Enable detailed Flyway logging
logging.level.org.flywaydb=DEBUG
logging.level.org.flywaydb.core.internal.command.migrate=DEBUG

# ===== JWT Configuration =====
jwt.secret=RiskSimulatorSecretKeyForJWTTokenGenerationAndValidationPurposeOnly123456789
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===== AI Service =====
ai.service.url=http://localhost:5000

# ===== Logging =====
logging.level.com.risk.risk_simulator=INFO