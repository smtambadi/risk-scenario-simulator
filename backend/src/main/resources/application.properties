spring.application.name=risk-simulator
spring.datasource.url=jdbc:postgresql://localhost:5432/risk_simulator
spring.datasource.username=postgres
spring.datasource.password=1253236

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

server.port=8081

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false

# Enable detailed Flyway logging
logging.level.org.flywaydb=DEBUG
logging.level.org.flywaydb.core.internal.command.migrate=DEBUG

# ===== JWT Configuration =====
# Secret key for JWT signing (use base64 encoded in production)
jwt.secret=RiskSimulatorSecretKeyForJWTTokenGenerationAndValidationPurposeOnly123456789
# Token expiration in milliseconds (24 hours = 86400000)
jwt.expiration=86400000
# Refresh token expiration in milliseconds (7 days = 604800000)
jwt.refresh-expiration=604800000